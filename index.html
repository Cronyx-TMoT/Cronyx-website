<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cronyx</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- IMMAGINE FISSA -->
    <div class="header">
        <img src="images/Cronyx_Logotype.png" alt="Cronyx Logotype" class="header-img" />
    </div>

    <!-- QUADRATI FISSI -->
    <div class="black-square"></div>
    <div class="red-square"></div>
    <div class="white-square"></div>
    <div class="blue-square"></div>

    <!-- CONTENITORE FISSO PER IL CONTENUTO -->
    <div class="content-wrapper">
        <div class="nav-bar">
            <span class="nav-home">Home</span>
            <span class="nav-versioni">Versioni</span>
            <span class="nav-dona">Dona</span>
            <span class="nav-assistenza">Assistenza</span>
        </div>

        <div class="main-content">
            <img src="images/Cronyx_Logo_Trasparent.png" alt="Cronyx Logo" class="logo-img" />
            <div class="text-group">
                <div class="logo">
                    Cron<span class="letter-y">y</span><span class="letter-x">x</span><sup class="tm">™</sup>
                </div>
                <div class="subtitle">The Matrix of Time</div>
            </div>
        </div>

        <div class="coming">
            Introduzione<br />
            <span style="font-size: 14px;">Presto disponibile</span>
        </div>
    </div>

    <!-- SPAZIATORE PER LO SCROLL -->
    <div class="spacer"></div>

    <!-- COPYRIGHT IN FONDO ALLA PAGINA -->
    <div class="year">© 2025 Cronyx. All rights reserved.</div>

    <script src="script.js"></script>
</body>
</html>
